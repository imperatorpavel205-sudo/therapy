services:
  - type: web
    name: therapy-app
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn therapy.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: therapy.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: therapy-db
          property: connectionString