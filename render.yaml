services:
  - type: web
    name: web-app
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn therapy.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true  # Render сгенерирует случайный ключ
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: web-app-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com

databases:
  - name: web-app-db
    databaseName: web_app_db
    user: web_app_user
    plan: free  # или starter для продакшена