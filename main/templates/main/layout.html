{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>{% block title %}Александр Журба{% endblock %}</title>

    <!-- Шрифты -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Fira+Sans+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">

    <!-- Основные стили -->
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/pack.css' %}">

    <!-- Дополнительные стили для конкретных страниц -->
    {% block extra_css %}{% endblock %}

    <!-- Favicon -->
    <link rel="icon" href="https://i.postimg.cc/DyBv19fd/TG_WEB.jpg">
    <link rel="apple-touch-icon" sizes="300x300" href="https://i.postimg.cc/DyBv19fd/TG_WEB.jpg">
    <link rel="image_src" href="https://i.postimg.cc/DyBv19fd/TG_WEB.jpg">

    <!-- Блок для скриптов в head -->
    {% block head_scripts %}{% endblock %}
</head>
<body>
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Основные скрипты -->
    {% block extra_js %}{% endblock %}
</body>
</html>
